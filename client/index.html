                    </div>
                </div>
            </div>

        </div>  
        ${renderFooter()}
    `;
        }
   
        const STACK_POS = [{ scale: 1, y: 12 }, { scale: 0.95, y: -16 }, { scale: 0.9, y: -44 }];
        const STACK_Z = { 0: 5, 1: 3, 2: 2 };
        let stackBusy = false;

        function stackTransform(pos) { const { scale, y } = STACK_POS[pos]; return `translate(-50%, ${y}px) scale(${scale})`; }

        function createStackCard(field, pos) {
            const el = document.createElement('div');
            el.className = 'stack-card';
            el.dataset.pos = String(pos);
            el.style.transform = stackTransform(pos);
            el.style.zIndex = STACK_Z[pos];
            el.style.pointerEvents = pos === 0 ? 'auto' : 'none';
            el.innerHTML = `
                <div class="stack-card-body">
                    ${monogramBadge(field, 64)}
                    <div class="field-card-title">${field.label}</div>
                    <div class="field-card-desc">${field.desc}</div>
                    <div class="field-card-keywords" style="justify-content:center">
                        ${field.keywords.slice(0, 4).map(k => `<span class="field-card-keyword">${k}</span>`).join('')}
                    </div>
                    <button class="btn btn-p stack-card-select" onclick="selectField('${field.key}')">Select This Field <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" style="margin-left:2px"><path d="M9.5 18L15.5 12L9.5 6"/></svg></button>
                </div>
            `;
            return el;
        }

        function updateStackDots() {
            const dots = document.getElementById('stackDots');
            if (dots) dots.textContent = `${state.stackIndex + 1} / ${FIELDS.length}`;
        }

        function initStack() {
            state.stackIndex = state.stackIndex || 0;
            stackBusy = false;
            const viewport = document.getElementById('stackViewport');
            if (!viewport) return;
            viewport.innerHTML = '';
            for (let pos = 0; pos < 3; pos++) {
                const f = FIELDS[(state.stackIndex + pos) % FIELDS.length];
                viewport.appendChild(createStackCard(f, pos));
            }
            updateStackDots();
        }

        function stackNext() {
            if (stackBusy) return; stackBusy = true;
            const viewport = document.getElementById('stackViewport');
            const front = viewport.querySelector('[data-pos="0"]');
            const mid = viewport.querySelector('[data-pos="1"]');
            const back = viewport.querySelector('[data-pos="2"]');

            front.style.pointerEvents = 'none';
            front.style.zIndex = 10;
            front.style.transform = `translate(-50%, 340px) scale(1)`;

            mid.dataset.pos = '0'; mid.style.transform = stackTransform(0); mid.style.zIndex = STACK_Z[0]; mid.style.pointerEvents = 'auto';
            back.dataset.pos = '1'; back.style.transform = stackTransform(1); back.style.zIndex = STACK_Z[1];

            const newField = FIELDS[(state.stackIndex + 3) % FIELDS.length];
            const newCard = createStackCard(newField, 2);
            newCard.style.transform = `translate(-50%, -16px) scale(0.9)`;
            newCard.style.opacity = '0';
            viewport.appendChild(newCard);
            requestAnimationFrame(() => requestAnimationFrame(() => {
                newCard.style.transform = stackTransform(2);
                newCard.style.opacity = '1';
            }));

            state.stackIndex = (state.stackIndex + 1) % FIELDS.length;
            updateStackDots();
            setTimeout(() => { front.remove(); stackBusy = false; }, 620);
        }

        function stackPrev() {
            if (stackBusy) return; stackBusy = true;
            const viewport = document.getElementById('stackViewport');
            const front = viewport.querySelector('[data-pos="0"]');
            const mid = viewport.querySelector('[data-pos="1"]');
            const back = viewport.querySelector('[data-pos="2"]');

            front.dataset.pos = '1'; front.style.transform = stackTransform(1); front.style.zIndex = STACK_Z[1]; front.style.pointerEvents = 'none';
            mid.dataset.pos = '2'; mid.style.transform = stackTransform(2); mid.style.zIndex = STACK_Z[2];

            back.style.transform = `translate(-50%, 60px) scale(0.85)`;
            back.style.opacity = '0';
            back.style.zIndex = 0;

            const newIndex = (state.stackIndex - 1 + FIELDS.length) % FIELDS.length;
            const newField = FIELDS[newIndex];
            const newCard = createStackCard(newField, 0);
            newCard.style.transform = `translate(-50%, -220px) scale(1)`;
            newCard.style.opacity = '0';
            newCard.style.zIndex = 10;
            viewport.appendChild(newCard);
            requestAnimationFrame(() => requestAnimationFrame(() => {
                newCard.style.transform = stackTransform(0);
                newCard.style.opacity = '1';
            }));

            state.stackIndex = newIndex;
            updateStackDots();
            setTimeout(() => { back.remove(); stackBusy = false; }, 620);
        }

        function selectField(key) {
            state.fieldKey = key;
            state.fieldData = FIELDS.find(f => f.key === key);
            initQuickInfo();
            state.screen = 'quick';
            render();
        }

       
        function initQuickInfo() {
            state.quickStep = 0;
            state.entryTypes = [];
            state.quickInfo = {
                fullName: '', email: '', phone: '', location: '', linkedin: '', github: '',
                // Company
                currentTitle: '', currentCompany: '', industry: '', employmentType: 'Full-time',
                workMode: 'Onsite', jobLocation: '', yearsOfExperience: 3, isCurrentlyWorking: false,
                // University
                degree: '', fieldOfStudy: '', university: '', universityLocation: '', gpa: '',
                startYear: '', gradYear: '', enrollmentStatus: 'Currently Enrolled',
                softSkills: '', background: ''
            };
        }

        function renderQuick() {
            const f = state.fieldData;
            const idx = state.quickStep;
            const step = QUICK_STEPS[idx];
            const isLast = idx === QUICK_STEPS.length - 1;
            return `
                <div class="header header-centered">
                    <button class="btn-ic" onclick="state.screen='select';render()" aria-label="Back to field selection">${ICONS.back}</button>
                    <div class="header-center">
                        ${monogramBadge(f, 32)}
                        <span class="header-center-label">${f.label}</span>
                    </div>
                    ${renderThemeToggle()}
                </div>
                <div class="container" style="padding:30px 20px">
                    <form id="quickForm" onsubmit="handleStepSubmit(event)" style="max-width:600px;margin:0 auto">
                        <div class="wizard-step-count">Step ${idx + 1} of ${QUICK_STEPS.length}</div>
                        <div class="wizard-progress">
                            ${QUICK_STEPS.map((s, i) => `<div class="wizard-dot ${i === idx ? 'active' : i < idx ? 'done' : ''}"></div>`).join('')}
                        </div>
                        <h2 style="font-size:24px;font-weight:800;margin-bottom:4px">${step.title}</h2>
                        <p style="color:var(--muted);margin-bottom:24px">${step.subtitle}</p>
                        <div class="wizard-fields" id="wizardFields">${renderQuickStepFields(step.id)}</div>
                        <div class="wizard-nav">
                            ${idx > 0 ? `<button type="button" class="btn btn-g" onclick="quickBack()">← Back</button>` : `<button type="button" class="btn btn-g" style="visibility:hidden">← Back</button>`}
                            <button type="submit" class="btn btn-p" style="flex:1">${isLast ? '✨ Generate Resume' : 'Next →'}</button>
                        </div>
                    </form>
                </div>
                ${renderFooter()}
            `;
        }

        function renderQuickStepFields(id) {
            const q = state.quickInfo;
            switch (id) {
                case 'basic':
                    return `<div class="grid grid-2">
                        <div><label>Full Name *</label><input class="input" value="${esc(q.fullName)}" oninput="qSet('fullName',this.value)" placeholder="John Doe" autofocus></div>
                        <div><label>Email *</label><input class="input" type="email" value="${esc(q.email)}" oninput="qSet('email',this.value)" placeholder="john@email.com"></div>
                    </div>`;
                case 'contact':
                    return `<div class="grid grid-2">
                        <div><label>Phone *</label><input class="input" value="${esc(q.phone)}" oninput="qSet('phone',this.value)" placeholder="+1234567890"></div>
                        <div><label>Location *</label><input class="input" value="${esc(q.location)}" oninput="qSet('location',this.value)" onblur="qTitleCase('location',this)" placeholder="City, Country"></div>
                    </div>`;
                case 'links':
                    return `<div class="grid grid-2">
                        <div><label>LinkedIn *</label><input class="input" value="${esc(q.linkedin)}" oninput="qSet('linkedin',this.value)" placeholder="linkedin.com/in/..."></div>
                        <div><label>GitHub</label><input class="input" data-optional="true" value="${esc(q.github)}" oninput="qSet('github',this.value)" placeholder="github.com/... (optional)"></div>
                    </div>`;
                case 'background':
                    return renderBackgroundStepFields();
                case 'skills':
                    return `<div><label>Soft Skills *</label><input class="input" value="${esc(q.softSkills)}" oninput="qSet('softSkills',this.value)" placeholder="Communication, Team Work, Leadership..."><span style="font-size:11px;color:var(--muted)">Comma-separated — at least one required</span></div>`;
                case 'about':
                    return `<div><label>About You *</label><textarea class="input" rows="7" oninput="qSet('background',this.value)" placeholder="Describe your experience, skills, achievements...&#10;Example: AI/ML engineer with hands-on experience building and deploying full-stack AI/ML systems, NLP, computer vision, and reinforcement learning.">${esc(q.background)}</textarea><span style="font-size:11px;color:var(--muted)">More detail = better resume</span></div>`;
                default: return '';
            }
        }

    
        function renderBackgroundStepFields() {
            const q = state.quickInfo, types = state.entryTypes;
            const hasCompany = types.includes('company');
            const hasUniversity = types.includes('university');
            let h = `<p class="entry-type-hint">Select one or both <strong style="color:var(--text2)">(required)</strong> — this decides which details we ask for next.</p>`;
            h += `<div class="entry-type-grid">
                <div class="entry-type-card ${hasCompany ? 'selected' : ''}" onclick="toggleEntryType('company')">
                    <div class="et-check">✓</div>
                    <div class="icon">💼</div>
                    <div class="et-title">Company</div>
                    <div class="et-desc">I'm working / have work experience</div>
                </div>
                <div class="entry-type-card ${hasUniversity ? 'selected' : ''}" onclick="toggleEntryType('university')">
                    <div class="et-check">✓</div>
                    <div class="icon">🎓</div>
                    <div class="et-title">University</div>
                    <div class="et-desc">I'm a student / recent graduate</div>
                </div>
            </div>`;

            if (hasCompany) {
                h += `<div class="conditional-block">
                    <div class="cb-label"><span class="cb-badge">💼</span> Company Details</div>
                    <div class="grid grid-2">
                        <div><label>Current / Recent Title *</label><input class="input" value="${esc(q.currentTitle)}" oninput="qSet('currentTitle',this.value)" placeholder="Data Analyst"></div>
                        <div><label>Company Name *</label><input class="input" value="${esc(q.currentCompany)}" oninput="qSet('currentCompany',this.value)" placeholder="Acme Corp"></div>
                        <div><label>Industry *</label><input class="input" value="${esc(q.industry)}" oninput="qSet('industry',this.value)" placeholder="Fintech, Healthcare..."></div>
                        <div><label>Job Location *</label><input class="input" value="${esc(q.jobLocation)}" oninput="qSet('jobLocation',this.value)" onblur="qTitleCase('jobLocation',this)" placeholder="City, Country"></div>
                        ${selectInput('employmentType', 'Employment Type', q.employmentType, ['Full-time', 'Part-time', 'Internship', 'Contract', 'Freelance'])}
                        ${selectInput('workMode', 'Work Mode', q.workMode, ['Onsite', 'Remote', 'Hybrid'])}
                        <div class="span-2"><label>Years of Experience *</label><input class="input" type="number" min="0" max="50" value="${esc(q.yearsOfExperience)}" oninput="qSet('yearsOfExperience',this.value)"></div>
                        <div class="span-2">
                            <label class="checkbox-row" style="text-transform:none;letter-spacing:0"><input type="checkbox" ${q.isCurrentlyWorking ? 'checked' : ''} onchange="qSetBool('isCurrentlyWorking',this.checked)"><span>I currently work here</span></label>
                        </div>
                    </div>
                </div>`;
            }
            if (hasUniversity) {
                h += `<div class="conditional-block">
                    <div class="cb-label"><span class="cb-badge">🎓</span> University Details</div>
                    <div class="grid grid-2">
                        <div><label>Degree *</label><input class="input" value="${esc(q.degree)}" oninput="qSet('degree',this.value)" placeholder="B.S. Computer Science"></div>
                        <div><label>Major / Field of Study *</label><input class="input" value="${esc(q.fieldOfStudy)}" oninput="qSet('fieldOfStudy',this.value)" placeholder="Data Science"></div>
                        <div><label>University *</label><input class="input" value="${esc(q.university)}" oninput="qSet('university',this.value)" placeholder="University Name"></div>
                        <div><label>University Location</label><input class="input" data-optional="true" value="${esc(q.universityLocation)}" oninput="qSet('universityLocation',this.value)" onblur="qTitleCase('universityLocation',this)" placeholder="City, Country (optional)"></div>
                        <div><label>GPA / CGPA</label><input class="input" data-optional="true" value="${esc(q.gpa)}" oninput="qSet('gpa',this.value)" placeholder="3.57 / 4.00 (optional)"></div>
                        ${selectInput('enrollmentStatus', 'Status', q.enrollmentStatus, ['Currently Enrolled', 'Graduated', 'On Leave'], 'refreshBackgroundFields()')}
                        <div><label>Start Year</label><input class="input" data-optional="true" value="${esc(q.startYear)}" oninput="qSet('startYear',this.value)" placeholder="2022 (optional)"></div>
                        <div><label>${q.enrollmentStatus === 'Graduated' ? 'Graduation Year' : 'Expected Graduation'}</label><input class="input" data-optional="true" value="${esc(q.gradYear)}" oninput="qSet('gradYear',this.value)" placeholder="2026 (optional)"></div>
                    </div>
                </div>`;
            }
            if (!hasCompany && !hasUniversity) {
                h += `<p style="font-size:12px;color:var(--yellow);margin-top:4px;font-weight:600">⚠ Select at least one to continue — you can still edit everything later.</p>`;
            }
            return h;
        }

        function toggleEntryType(type) {
            const i = state.entryTypes.indexOf(type);
            if (i > -1) state.entryTypes.splice(i, 1); else state.entryTypes.push(type);
            const wf = document.getElementById('wizardFields');
            if (wf) wf.innerHTML = renderQuickStepFields('background');
        }

        function qSet(field, val) { state.quickInfo[field] = val; }
        function qSetBool(field, val) { state.quickInfo[field] = val; }

        function qTitleCase(field, inputEl) {
            const v = titleCase(state.quickInfo[field]);
            state.quickInfo[field] = v;
            if (inputEl) inputEl.value = v;
        }

        function refreshBackgroundFields() {
            const wf = document.getElementById('wizardFields');
            if (wf) wf.innerHTML = renderQuickStepFields('background');
        }

        // Renders a styled <select> that matches the .input look, with a custom chevron.
        function selectInput(name, label, value, options, extraOnChange) {
            const onchange = `qSet('${name}',this.value);${extraOnChange || ''}`;
            return `<div><label>${label}</label><div class="select-wrap"><select class="input" onchange="${onchange}">${options.map(o => `<option value="${o}" ${value === o ? 'selected' : ''}>${o}</option>`).join('')}</select></div></div>`;
        }

        function isFieldEmpty(el) {
            if (el.type === 'checkbox') return false; // toggles are optional by nature, not "required text"
            return !String(el.value || '').trim();
        }

    
        function fieldLabelText(el) {
            const wrap = el.closest('div');
            const label = wrap ? wrap.querySelector('label') : null;
            if (label) return label.textContent.replace('*', '').trim();
            return el.placeholder || 'This field';
        }

        function validateVisibleRequiredFields(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return true;
            const fields = container.querySelectorAll('input.input, textarea.input, select.input');
            for (const el of fields) {
                if (el.offsetParent === null) continue; // skip anything not actually shown
                if (el.dataset.optional === 'true') continue; // explicitly optional -- never required
                if (isFieldEmpty(el)) {
                    toast(`Please fill in "${fieldLabelText(el)}" before continuing`, 'e');
                    el.focus();
                    return false;
                }
            }
            return true;
        }

        function looksLikeGibberishWord(rawWord) {
            const alphaOnly = rawWord.replace(/[^A-Za-z]/g, '');
            if (alphaOnly.length < 3) return false;
            if (alphaOnly === alphaOnly.toUpperCase() && alphaOnly.length <= 6) return false; // likely an acronym
            const w = alphaOnly.toLowerCase();
            if (w.length >= 5 && !/[aeiouy]/.test(w)) return true;
            if (/([a-z])\1{3,}/.test(w)) return true;
            if (/[^aeiou]{6,}/.test(w)) return true;
            for (let len = 2; len <= 4; len++) {
                const re = new RegExp(`^(.{${len}})\\1+.{0,${len - 1}}$`);
                if (re.test(w) && w.length >= len * 2) return true;
            }
            return false;
        }

        function textLooksLikeGibberish(text) {
            const words = (text || '').trim().split(/\s+/).filter(Boolean);
            if (!words.length) return true;
            const bad = words.filter(looksLikeGibberishWord).length;
            return (bad / words.length) > 0.35;
        }

        function validateQuickStep(id) {
            // 1) Nothing on this step may be left empty (except fields marked optional).
            if (!validateVisibleRequiredFields('wizardFields')) return false;

            const q = state.quickInfo;

            if (id === 'basic') {
                if (q.fullName.trim().length < 2) { toast('Please enter your full name', 'e'); return false; }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(q.email.trim())) { toast('Please enter a valid email address', 'e'); return false; }
                if (textLooksLikeGibberish(q.fullName)) { toast('That doesn\'t look like a real name — please double-check it', 'e'); return false; }
            }

            if (id === 'contact') {
                const digitCount = (q.phone.match(/\d/g) || []).length;
                if (digitCount < 7) { toast('Please enter a valid phone number', 'e'); return false; }
            }

            if (id === 'background') {
                if (!state.entryTypes.length) { toast('Select Company and/or University to continue', 'e'); return false; }
            }

            if (id === 'about') {
                const text = q.background.trim();
                if (text.length < 20) { toast('Please write at least a couple sentences about yourself', 'e'); return false; }
                if (textLooksLikeGibberish(text)) { toast('That doesn\'t look like real words — please describe yourself in actual sentences', 'e'); return false; }
            }

            return true;
        }

        function handleStepSubmit(e) {
            e.preventDefault();
            const idx = state.quickStep;
            const step = QUICK_STEPS[idx];
            if (!validateQuickStep(step.id)) return;
            if (idx < QUICK_STEPS.length - 1) {
                state.quickStep++;
                render();
                requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: 'smooth' }));
            } else {

                state.screen = 'loading';

        }

        async function startGeneration() {
            for (let i = 1; i <= 5; i++) {
                state.loadingStep = i;
                const bar = document.getElementById('progressBar');
                if (bar) bar.style.width = `${(i / 5) * 100}%`;
                const list = document.getElementById('loadingStepsList');
                if (list) list.innerHTML = renderLoadingStepsHtml();
                await new Promise(r => setTimeout(r, 400));
            }

            try {
                const res = await fetch(`${API}/api/generate-resume`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fieldLabel: state.fieldData.label, fieldKey: state.fieldData.key, skillCats: state.fieldData.skillCats, keywords: state.fieldData.keywords, entryTypes: state.entryTypes, quickInfo: state.quickInfo })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                const d = data.data;
                d.experience = (d.experience || []).map(e => ({ ...e, uid: uid(), bullets: (e.bullets || []).map(b => ({ uid: uid(), text: b })) }));
                d.projects = (d.projects || []).map(p => ({ ...p, uid: uid(), link: p.link || '', liveLink: p.liveLink || '', bullets: (p.bullets || []).map(b => ({ uid: uid(), text: b })) }));
                d.education = (d.education || []).map(e => ({ ...e, uid: uid(), coursework: e.coursework || '' }));
                d.certifications = (d.certifications || []).map(c => ({ ...c, uid: uid(), bullets: (c.bullets || []).map(b => ({ uid: uid(), text: b })) }));
                d.softSkills = (state.quickInfo.softSkills || '').split(',').map(s => s.trim()).filter(Boolean);
              
                d.skills = normalizeSkillsToCategories(d.skills, state.fieldData.skillCats);
                if (d.personal?.location) d.personal.location = titleCase(d.personal.location);
                state.form = d; state.aiSource = data.source || 'template'; state.screen = 'editor';
                undoStack = []; redoStack = [];
                markActiveScreen('editor');
                render();
                scheduleAutosave();
                toast(data.source === 'ai' ? 'Resume generated by AI ✨' : 'Resume generated! 🎉', 's');
            } catch (err) {
                toast('Generation failed. Try again.', 'e');
                state.screen = 'quick'; render();
            }
        }

        function renderSectionOrderControls() {
            return `

        function renderSectionOrderItems() {
            return sectionOrder.map((key, index) => {
                const section = ALL_SECTIONS.find(s => s.key === key);
                if (!section) return '';
                const visible = sectionVisibility[key] !== false;
                return `
                    <div class="section-order-item" draggable="true" data-key="${key}" data-index="${index}"
                         ondragstart="onSectionDragStart(event)" ondragover="onSectionDragOver(event)"
                         ondrop="onSectionDrop(event)" ondragend="onSectionDragEnd(event)">
                        <span class="drag-handle">${ICONS.drag}</span>
                        <span class="section-label">${esc(section.label)}</span>
                        <span class="section-badge">${index + 1}</span>
                        <div class="section-toggle">
                            <input type="checkbox" ${visible ? 'checked' : ''} onchange="toggleSection('${key}')" aria-label="Show ${esc(section.label)}">
                            <button class="btn-ic" onclick="moveSectionUp(${index})" ${index === 0 ? 'disabled' : ''} aria-label="Move up" title="Move up">${ICONS.up}</button>
                            <button class="btn-ic" onclick="moveSectionDown(${index})" ${index === sectionOrder.length - 1 ? 'disabled' : ''} aria-label="Move down" title="Move down">${ICONS.down}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function refreshSectionOrderUI() {
            const container = document.getElementById('sectionOrderContainer');
            if (container) container.innerHTML = renderSectionOrderItems();
        }

        function toggleSection(key) {
            sectionVisibility[key] = sectionVisibility[key] === false; // flip, defaulting true->false
            saveSectionPreferences();
            refreshSectionOrderUI();
            refreshPreview();
        }

        function moveSectionUp(index) {
            if (index <= 0) return;
            [sectionOrder[index], sectionOrder[index - 1]] = [sectionOrder[index - 1], sectionOrder[index]];
            saveSectionPreferences();
            refreshSectionOrderUI();
            refreshPreview();
        }

        function moveSectionDown(index) {
            if (index >= sectionOrder.length - 1) return;
            [sectionOrder[index], sectionOrder[index + 1]] = [sectionOrder[index + 1], sectionOrder[index]];
            saveSectionPreferences();
            refreshSectionOrderUI();
            refreshPreview();
        }

        let sectionDragKey = null;
        function onSectionDragStart(e) {
            const el = e.target.closest('.section-order-item');
            if (!el) return;
            sectionDragKey = el.dataset.key;
            el.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', sectionDragKey);
        }
        function onSectionDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }
        function onSectionDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.section-order-item');
            const sourceKey = e.dataTransfer.getData('text/plain') || sectionDragKey;
            const targetKey = target?.dataset.key;
            if (!sourceKey || !targetKey || sourceKey === targetKey) return;
            const sourceIndex = sectionOrder.indexOf(sourceKey);
            const targetIndex = sectionOrder.indexOf(targetKey);
            if (sourceIndex === -1 || targetIndex === -1) return;
            sectionOrder.splice(sourceIndex, 1);
            sectionOrder.splice(targetIndex, 0, sourceKey);
            saveSectionPreferences();
            refreshSectionOrderUI();
            refreshPreview();
        }
        function onSectionDragEnd(e) {
            const el = e.target.closest('.section-order-item');
            if (el) el.classList.remove('dragging');
            sectionDragKey = null;
        }

        function esc(s) {
            if (s === null || s === undefined) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

     
        function titleCase(s) {
            if (!s) return s;
            return String(s).replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
        }
        function titleCasePers(field, inputEl) {
            const v = titleCase(state.form.personal[field]);
            state.form.personal[field] = v;
            if (inputEl) inputEl.value = v;
            refreshPreview();
        }

        const INLINE_FORMAT_MARKERS = {
            bold: { open: '\uE000B', close: '\uE001B' },
            larger: { open: '\uE000L', close: '\uE001L' },
            smaller: { open: '\uE000S', close: '\uE001S' }
        };

        function escapeRegExp(str) {
            return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function applyInlineMarkup(escapedText) {
            if (!escapedText) return escapedText;
            let t = escapedText;
            const replaceMarker = (source, open, close, html) => {
                const re = new RegExp(`${escapeRegExp(open)}(.+?)${escapeRegExp(close)}`, 'g');
                return source.replace(re, html);
            };
            t = replaceMarker(t, INLINE_FORMAT_MARKERS.bold.open, INLINE_FORMAT_MARKERS.bold.close, '<strong>$1</strong>');
            t = replaceMarker(t, INLINE_FORMAT_MARKERS.larger.open, INLINE_FORMAT_MARKERS.larger.close, '<span style="font-size:1.25em;font-weight:700">$1</span>');
            t = replaceMarker(t, INLINE_FORMAT_MARKERS.smaller.open, INLINE_FORMAT_MARKERS.smaller.close, '<span style="font-size:0.82em">$1</span>');
            t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            t = t.replace(/\+\+(.+?)\+\+/g, '<span style="font-size:1.25em;font-weight:700">$1</span>');
            t = t.replace(/--(.+?)--/g, '<span style="font-size:0.82em">$1</span>');
            return t;
        }
        function escHL(s) {
            let escaped = esc(s);
            escaped = applyInlineMarkup(escaped);
            if (!state.highlightKeywords || !escaped) return escaped;
            const kw = (state.fieldData?.keywords || []).slice().sort((a, b) => b.length - a.length);
            if (!kw.length) return escaped;
            const pattern = kw.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
            if (!pattern) return escaped;
            const re = new RegExp(`(${pattern})`, 'gi');
            return escaped.replace(re, '<mark class="kw-hit">$1</mark>');
        }

        function toUrl(raw) {
            if (!raw) return '';
            let s = raw.trim();
            if (!s) return '';
            if (/^https?:\/\//i.test(s)) return esc(s);
            if (s.startsWith('www.')) return 'https://' + esc(s);
            if (s.includes('.')) return 'https://' + esc(s); // looks like a domain already
            return '';
        }
        function linkedinUrl(raw) {
            if (!raw) return '';
            const s = raw.trim();
            if (/^https?:\/\//i.test(s) || s.includes('linkedin.com')) return toUrl(s);
            const handle = s.replace(/^@/, '').replace(/^in\//, '');
            return 'https://www.linkedin.com/in/' + esc(handle);
        }
        function githubUrl(raw) {
            if (!raw) return '';
            const s = raw.trim();
            if (/^https?:\/\//i.test(s) || s.includes('github.com')) return toUrl(s);
            const handle = s.replace(/^@/, '');
            return 'https://github.com/' + esc(handle);
        }

        function projectLinksHtml(pr) {
            const parts = [];
            if (pr.link) parts.push(`<a href="${toUrl(pr.link)}" target="_blank" rel="noopener noreferrer">${pr.liveLink ? 'Code' : 'Live Demo'}</a>`);
            if (pr.liveLink) parts.push(`<a href="${toUrl(pr.liveLink)}" target="_blank" rel="noopener noreferrer">Live</a>`);
            return parts.join(' &nbsp;·&nbsp; ');
        }

        function renderBulletRows(type, itemUid, bullets, F) {
            return (bullets || []).map(b => `
                <div class="bullet-row" style="display:flex;gap:4px;margin-bottom:4px;align-items:center">
                    <span style="padding-top:0">•</span>
                    <input class="input" value="${esc(b.text)}" oninput="updateBullet('${type}','${itemUid}','${b.uid}',this.value)" ${F} data-type="${type}" data-item="${itemUid}" data-buid="${b.uid}">
                    <div style="display:flex;gap:2px;flex-shrink:0">
                        <button type="button" class="btn-ic" style="width:26px;height:26px;color:var(--red)" title="Delete this bullet" onclick="pushHistorySnapshot();deleteBullet('${type}','${itemUid}','${b.uid}')">✕</button>
                    </div>
                </div>
            `).join('');
        }

      
        function wrapBulletSelection(btnEl, open, close) {
            const row = btnEl.closest('.bullet-row');
            const input = row?.querySelector('input.input');
            if (!input) return;
            let start = input.selectionStart, end = input.selectionEnd;
            if (start === null || end === null || start === end) { start = 0; end = input.value.length; }
            if (start === end) { toast('Type some text first, then select it to format', 'e'); return; }
            const val = input.value;
            const selected = val.slice(start, end);
            const markerMap = {
                '**': INLINE_FORMAT_MARKERS.bold,
                '++': INLINE_FORMAT_MARKERS.larger,
                '--': INLINE_FORMAT_MARKERS.smaller
            };
            const markers = markerMap[open] || { open, close };
            const newVal = val.slice(0, start) + markers.open + selected + markers.close + val.slice(end);
            pushHistorySnapshot();
            input.value = newVal;
            input.dispatchEvent(new Event('input', { bubbles: true }));
            input.focus();
            input.setSelectionRange(start, end + markers.open.length + markers.close.length);
        }

      
        function deleteBullet(type, itemUid, buid) {
            const arr = type === 'exp' ? state.form.experience : type === 'proj' ? state.form.projects : state.form.certifications;
            const item = arr.find(i => i.uid === itemUid);
            if (!item) return;
            item.bullets = (item.bullets || []).filter(b => b.uid !== buid);
            refreshEditor();
        }

        function normalizeBulletForDup(t) {
            return (t || '').toLowerCase()
                .replace(/\d+[%kmb]*\+?/g, '#')
                .replace(/[^a-z#\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function hasDuplicateBullets(form) {
            const all = (form.experience || []).flatMap(e => (e.bullets || []).map(b => b.text || ''))
                .concat((form.projects || []).flatMap(p => (p.bullets || []).map(b => b.text || '')));
            const seen = new Set();
            for (const raw of all) {
                const n = normalizeBulletForDup(raw);
                if (!n) continue;
                if (seen.has(n)) return true;
                seen.add(n);
            }
            return false;
        }

        function calcATSDetailed() {
            const form = state.form;
            if (!form) return { score: 0, matchedKeywords: [], missingKeywords: [], checks: [] };

            const kw = state.fieldData?.keywords || [];
            const bulletsText = (form.experience || []).flatMap(e => (e.bullets || []).map(b => b.text || '')).join(' ').toLowerCase();
            const summaryText = (form.personal?.summary || '').toLowerCase();
            const projText = (form.projects || []).flatMap(p => [(p.tech || ''), ...(p.bullets || []).map(b => b.text || '')]).join(' ').toLowerCase();
            const skillsText = Object.values(form.skills || {}).filter(Boolean).join(' ').toLowerCase();

            const matched = [], missing = [];
            const perKw = kw.length ? (55 / kw.length) : 0; // keyword coverage worth up to 55 pts
            let kwPoints = 0;
            kw.forEach(k => {
                const lk = k.toLowerCase();
                const demonstrated = bulletsText.includes(lk) || summaryText.includes(lk) || projText.includes(lk);
                const listedOnly = !demonstrated && skillsText.includes(lk);
                if (demonstrated) { kwPoints += perKw; matched.push(k); }
                else if (listedOnly) { kwPoints += perKw * 0.5; matched.push(k); }
                else missing.push(k);
            });

            const hasEmail = !!form.personal?.email;
            const hasPhone = !!form.personal?.phone;
            const hasExp = (form.experience?.length || 0) > 0;
            const hasMetrics = !!bulletsText && /\d/.test(bulletsText);
            const hasSkillDepth = Object.values(form.skills || {}).filter(Boolean).length >= 2;
            const hasSummary = (form.personal?.summary || '').trim().length > 30;
            const noDup = !hasDuplicateBullets(form);

            const checks = [
                { label: 'Email address present', pass: hasEmail, points: hasEmail ? 6 : 0 },
                { label: 'Phone number present', pass: hasPhone, points: hasPhone ? 3 : 0 },
                { label: 'Work experience listed', pass: hasExp, points: hasExp ? 10 : 0 },
                { label: 'Bullets include numbers / metrics', pass: hasMetrics, points: hasMetrics ? 8 : 0 },
                { label: '2+ skill categories filled', pass: hasSkillDepth, points: hasSkillDepth ? 6 : 0 },
                { label: 'Summary written (30+ chars)', pass: hasSummary, points: hasSummary ? 5 : 0 },
                { label: 'No near-duplicate bullets', pass: noDup, points: noDup ? 7 : 0 },
            ];
            const structurePoints = checks.reduce((sum, c) => sum + c.points, 0);

            const score = Math.max(0, Math.min(100, Math.round(kwPoints + structurePoints)));
            return { score, matchedKeywords: matched, missingKeywords: missing, checks, hasDuplicates: !noDup };
        }

        function calcATS() { return calcATSDetailed().score; }

        function getSuggestions(atsData) {
            const form = state.form; if (!form) return [];
            const p = form.personal || {};
            const s = [];
            if (!p.phone) s.push('Add a phone number');
            if (!p.linkedin) s.push('Add a LinkedIn profile');
            if (!(form.experience?.length) && !(form.projects?.length)) s.push('Add work experience or a project');
            if (atsData.hasDuplicates) s.push('Some bullets look near-identical — vary the wording/metrics');
            if (!(form.personal?.summary || '').trim()) s.push('Write a short summary');
            return s;
        }

        function getMissing() { return calcATSDetailed().missingKeywords; }

        function normalizeSkillsToCategories(rawSkills, categories) {
            const result = {};
            categories.forEach(c => result[c] = '');
            if (!rawSkills || typeof rawSkills !== 'object') return result;

            const usedKeys = new Set();
            categories.forEach(cat => {
                const foundKey = Object.keys(rawSkills).find(k => !usedKeys.has(k) && k.toLowerCase().trim() === cat.toLowerCase().trim());
                if (foundKey) { result[cat] = rawSkills[foundKey]; usedKeys.add(foundKey); }
            });

            const leftoverCats = categories.filter(c => !result[c]);
            const leftoverKeys = Object.keys(rawSkills).filter(k => !usedKeys.has(k));
            leftoverCats.forEach((cat, i) => { if (leftoverKeys[i]) result[cat] = rawSkills[leftoverKeys[i]]; });
            return result;
        }

        function addKW(kw) {
            const form = state.form; if (!form?.skills) return;
            const cats = state.fieldData.skillCats; let best = cats[0], min = Infinity;
            cats.forEach(c => { const l = (form.skills[c] || '').split(',').length; if (l < min) { min = l; best = c; } });
            if (Object.values(form.skills).join(',').toLowerCase().includes(kw.toLowerCase())) { toast('Already exists', 'e'); return; }
            form.skills[best] = form.skills[best] ? `${form.skills[best]}, ${kw}` : kw;
            refreshEditor(); toast(`Added "${kw}"`, 's');
        }

        // Updates
        function updatePers(f, v) { state.form.personal[f] = v; refreshPreview(); }
        function updateExp(uid, f, v) { const e = state.form.experience.find(e => e.uid === uid); if (e) { e[f] = v; refreshPreview(); } }
        function updateProj(uid, f, v) { const p = state.form.projects.find(p => p.uid === uid); if (p) { p[f] = v; refreshPreview(); } }
        function updateEdu(uid, f, v) { const e = state.form.education.find(e => e.uid === uid); if (e) { e[f] = v; refreshPreview(); } }
        function updateCert(uid, f, v) { const c = state.form.certifications.find(c => c.uid === uid); if (c) { c[f] = v; refreshPreview(); } }
        function updateSkill(c, v) { state.form.skills[c] = v; refreshPreview(); }
        function updateSoftSkills(v) { state.form.softSkills = v.split(',').map(s => s.trim()).filter(Boolean); refreshPreview(); }
        function updateBullet(type, puid, buid, v) { const arr = type === 'exp' ? state.form.experience : type === 'proj' ? state.form.projects : state.form.certifications; const item = arr.find(i => i.uid === puid); if (item) { const b = item.bullets.find(b => b.uid === buid); if (b) { b.text = v; refreshPreview(); } } }
        function addBullet(type, puid) { const arr = type === 'exp' ? state.form.experience : type === 'proj' ? state.form.projects : state.form.certifications; const item = arr.find(i => i.uid === puid); if (item) { if (!item.bullets) item.bullets = []; item.bullets.push({ uid: uid(), text: '' }); refreshEditor(); } }
        function addExperience() { pushHistorySnapshot(); state.form.experience.push({ uid: uid(), title: '', company: '', startDate: '', endDate: '', bullets: [{ uid: uid(), text: '' }] }); refreshEditor(); toast('Position added', 's'); }
        function addProject() { pushHistorySnapshot(); state.form.projects.push({ uid: uid(), name: '', tech: '', link: '', liveLink: '', bullets: [{ uid: uid(), text: '' }] }); refreshEditor(); toast('Project added', 's'); }
        function addEducation() { pushHistorySnapshot(); if (!state.form.education) state.form.education = []; state.form.education.push({ uid: uid(), degree: '', institution: '', startDate: '', endDate: '', gpa: '', coursework: '' }); refreshEditor(); toast('Education added', 's'); }
        function addCertification() { pushHistorySnapshot(); if (!state.form.certifications) state.form.certifications = []; state.form.certifications.push({ uid: uid(), name: '', issuer: '', date: '', bullets: [{ uid: uid(), text: '' }] }); refreshEditor(); toast('Certification added', 's'); }
        function removeItem(type, uid) { state.form[type] = state.form[type].filter(i => i.uid !== uid); refreshEditor(); }

        function addSkillCategoryFromInput() {
            const input = document.getElementById('newSkillCatInput');
            const name = (input?.value || '').trim();
            if (!name) { toast('Enter a category name', 'e'); return; }
            if (state.fieldData.skillCats.some(c => c.toLowerCase() === name.toLowerCase())) { toast('Category already exists', 'e'); return; }
            pushHistorySnapshot();
            state.fieldData.skillCats.push(name);
            if (!state.form.skills) state.form.skills = {};
            state.form.skills[name] = '';
            refreshEditor(); toast(`Added "${name}"`, 's');
        }
        function removeSkillCategory(name) {
            state.fieldData.skillCats = state.fieldData.skillCats.filter(c => c !== name);
            if (state.form.skills) delete state.form.skills[name];
            refreshEditor();
        }

        function addSoftSkillTag() {
            const input = document.getElementById('newSoftSkillInput');
            const val = (input?.value || '').trim();
            if (!val) return;
            pushHistorySnapshot();
            if (!state.form.softSkills) state.form.softSkills = [];
            state.form.softSkills.push(val);
            refreshEditor();
        }
        function removeSoftSkillTag(index) {
            state.form.softSkills.splice(index, 1);
            refreshEditor();
        }
        async function rewriteSection(type, itemUid) {
            try {
                let d; if (type === 'summary') d = { summary: state.form.personal?.summary || '' }; else { const e = state.form.experience.find(e => e.uid === itemUid); if (e) d = { bullets: e.bullets.map(b => b.text) }; }
                if (!d) return;
                const res = await fetch(`${API}/api/rewrite-section`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fieldLabel: state.fieldData.label, sectionType: type, sectionData: d, currentContent: '' }) });
                const r = await res.json();
                if (r.success) {
                    pushHistorySnapshot();
                    if (type === 'summary') state.form.personal.summary = r.data.summary;
                    else { const e = state.form.experience.find(e => e.uid === itemUid); if (e) e.bullets = r.data.bullets.map(t => ({ uid: uid(), text: t })); }
                    refreshEditor();
                    toast(r.source === 'ai' ? 'Rewritten by AI ✨' : 'Rewritten!', 's');
                } else {
                    toast('Rewrite failed', 'e');
                }
            } catch (e) { toast('Failed', 'e'); }
        }

        function setTemplate(t) {
            state.template = t;
            const el = document.getElementById('resumePreview');
            el.className = `resume ${t}`;
            el.innerHTML = renderPreview();
            document.getElementById('previewLabel').textContent = `LIVE PREVIEW · ${(TEMPLATES.find(x => x.key === t) || {}).label.toUpperCase()}`;
            document.querySelectorAll('.tpl-pill').forEach(btn => btn.classList.toggle('active', btn.textContent === (TEMPLATES.find(x => x.key === t) || {}).label));
        }

        function refreshEditor() { document.getElementById('editPanel').innerHTML = renderSectionOrderControls() + renderEditPanel(); refreshPreview(); }
        function refreshPreview() { const p = document.getElementById('resumePreview'); if (p) p.innerHTML = renderPreview(); scheduleAutosave(); }

        async function downloadPDF(btnEl) {
            if (!state.isPdfReady) { toast('Loading PDF engine...', 'e'); return; }
            const btn = btnEl || event.target;
            const original = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '⏳...';
            try {
                const el = document.getElementById('resumePreview');
                const c = await html2canvas(el, { scale: 2, backgroundColor: '#fff', logging: false });
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'in', 'letter');
                const pageW = 8.5, pageH = 11;
                const imgW = pageW;
                const imgH = (c.height * imgW) / c.width;

                if (imgH <= pageH + 0.01) {
                    pdf.addImage(c.toDataURL('image/png'), 'PNG', 0, 0, imgW, imgH);
                } else {
             
                    const pageCanvasHeightPx = Math.floor((pageH * c.width) / imgW);
                    let renderedHeightPx = 0, pageIndex = 0;
                    while (renderedHeightPx < c.height) {
                        const sliceHeightPx = Math.min(pageCanvasHeightPx, c.height - renderedHeightPx);
                        const pageCanvas = document.createElement('canvas');
                        pageCanvas.width = c.width;
                        pageCanvas.height = sliceHeightPx;
                        const ctx = pageCanvas.getContext('2d');
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
                        ctx.drawImage(c, 0, renderedHeightPx, c.width, sliceHeightPx, 0, 0, c.width, sliceHeightPx);
                        const sliceImgH = (sliceHeightPx * imgW) / c.width;
                        if (pageIndex > 0) pdf.addPage();
                        pdf.addImage(pageCanvas.toDataURL('image/png'), 'PNG', 0, 0, imgW, sliceImgH);
                        renderedHeightPx += sliceHeightPx;
                        pageIndex++;
                    }
                }

             
                const elRect = el.getBoundingClientRect();
                const scale = imgW / elRect.width;
                el.querySelectorAll('a[href]').forEach(a => {
                    const r = a.getBoundingClientRect();
                    const yTopIn = (r.top - elRect.top) * scale;
                    const yBotIn = (r.bottom - elRect.top) * scale;
                    const page = Math.floor(yTopIn / pageH);
                    pdf.setPage(page + 1);
                    const x = (r.left - elRect.left) * scale;
                    const y = yTopIn - page * pageH;
                    const lw = r.width * scale, lh = yBotIn - yTopIn;
                    if (lw > 0 && lh > 0) pdf.link(x, y, lw, lh, { url: a.getAttribute('href') });
                });

                pdf.save(`${state.form?.personal?.fullName || 'Resume'}.pdf`);
                toast('Downloaded with clickable links! 📄', 's');
            } catch (e) { console.error(e); toast('PDF failed', 'e'); }
            btn.disabled = false; btn.innerHTML = original;
        }

        function bulletTextToDocxRuns(text, TextRunClass) {
            const runs = [];
            const re = /\*\*(.+?)\*\*|\+\+(.+?)\+\+|--(.+?)--|\uE000B(.+?)\uE001B|\uE000L(.+?)\uE001L|\uE000S(.+?)\uE001S/g;
            let lastIndex = 0, m;
            const t = text || '';
            while ((m = re.exec(t)) !== null) {
                if (m.index > lastIndex) runs.push(new TextRunClass({ text: t.slice(lastIndex, m.index) }));
                if (m[1] !== undefined) runs.push(new TextRunClass({ text: m[1], bold: true }));
                else if (m[2] !== undefined) runs.push(new TextRunClass({ text: m[2], bold: true, size: 26 }));
                else if (m[3] !== undefined) runs.push(new TextRunClass({ text: m[3], size: 18 }));
                else if (m[4] !== undefined) runs.push(new TextRunClass({ text: m[4], bold: true }));
                else if (m[5] !== undefined) runs.push(new TextRunClass({ text: m[5], bold: true, size: 26 }));
                else if (m[6] !== undefined) runs.push(new TextRunClass({ text: m[6], size: 18 }));
                lastIndex = re.lastIndex;
            }
            if (lastIndex < t.length) runs.push(new TextRunClass({ text: t.slice(lastIndex) }));
            if (!runs.length) runs.push(new TextRunClass({ text: t }));
            return runs;
        }

        async function downloadDOCX(btnEl) {
            if (!state.isDocxReady) { toast('Loading Word export engine...', 'e'); return; }
            const btn = btnEl || event.target;
            const original = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '⏳...';
            try {
                const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, ExternalHyperlink } = docx;
                const form = state.form, p = form.personal || {};
                const children = [];

                children.push(new Paragraph({ text: p.fullName || 'Your Name', heading: HeadingLevel.TITLE, alignment: AlignmentType.CENTER }));
                if (p.title) children.push(new Paragraph({ children: [new TextRun({ text: p.title, size: 24, color: '444444' })], alignment: AlignmentType.CENTER, spacing: { after: 120 } }));

                const contactRuns = [];
                const addContact = (text) => { if (contactRuns.length) contactRuns.push(new TextRun({ text: '   |   ' })); contactRuns.push(new TextRun({ text })); };
                if (p.email) addContact(p.email);
                if (p.phone) addContact(p.phone);
                if (p.location) addContact(p.location);
                if (contactRuns.length) children.push(new Paragraph({ children: contactRuns, alignment: AlignmentType.CENTER, spacing: { after: 100 } }));

                const linkRuns = [];
                if (p.linkedin) linkRuns.push(new ExternalHyperlink({ link: linkedinUrl(p.linkedin), children: [new TextRun({ text: 'LinkedIn', style: 'Hyperlink' })] }));
                if (p.github) { if (linkRuns.length) linkRuns.push(new TextRun({ text: '   |   ' })); linkRuns.push(new ExternalHyperlink({ link: githubUrl(p.github), children: [new TextRun({ text: 'GitHub', style: 'Hyperlink' })] })); }
                if (linkRuns.length) children.push(new Paragraph({ children: linkRuns, alignment: AlignmentType.CENTER, spacing: { after: 200 } }));

                const sectionHeading = (text) => new Paragraph({ text, heading: HeadingLevel.HEADING_2, spacing: { before: 260, after: 100 } });
                const metaLine = (text) => new Paragraph({ children: [new TextRun({ text, italics: true, size: 20, color: '555555' })], spacing: { after: 80 } });
                const bulletLine = (text) => new Paragraph({ children: bulletTextToDocxRuns(text, TextRun), bullet: { level: 0 }, spacing: { after: 40 } });

                const sectionBuilders = {
                    summary: () => {
                        if (!p.summary) return;
                        children.push(sectionHeading('Summary'));
                        children.push(new Paragraph({ text: p.summary, spacing: { after: 100 } }));
                    },
                    experience: () => {
                        if (form.experience?.length) {
                            children.push(sectionHeading('Work Experience'));
                            form.experience.forEach(e => {
                                children.push(new Paragraph({ children: [new TextRun({ text: `${e.title || ''}${e.company ? ' — ' + e.company : ''}`, bold: true, size: 24 })], spacing: { before: 100 } }));
                                const metaLineText = [e.location, `${e.startDate || ''} - ${e.endDate || ''}`].filter(Boolean).join(' | ');
                                if (metaLineText) children.push(metaLine(metaLineText));
                                (e.bullets || []).forEach(b => { if (b.text) children.push(bulletLine(b.text)); });
                            });
                        }
                        
                        if (form.projects?.length) {
                            children.push(new Paragraph({ children: [new TextRun({ text: 'Projects', bold: true, size: 24 })], spacing: { before: 160, after: 80 } }));
                            form.projects.forEach(pr => {
                                children.push(new Paragraph({ children: [new TextRun({ text: pr.name || '', bold: true, size: 24 })], spacing: { before: 80 } }));
                                if (pr.tech) children.push(metaLine(pr.tech));
                                (pr.bullets || []).forEach(b => { if (b.text) children.push(bulletLine(b.text)); });
                            });
                        }
                    },
                    skills: () => {
                        if (!(form.skills && Object.values(form.skills).some(Boolean))) return;
                        children.push(sectionHeading('Technical Skills'));
                        Object.entries(form.skills).forEach(([k, v]) => { if (v) children.push(new Paragraph({ children: [new TextRun({ text: `${k}: `, bold: true }), new TextRun({ text: v })], spacing: { after: 40 } })); });
                    },
                    softskills: () => {
                        if (!form.softSkills?.length) return;
                        children.push(sectionHeading('Soft Skills'));
                        children.push(new Paragraph({ text: form.softSkills.join(' • '), spacing: { after: 100 } }));
                    },
                    education: () => {
                        if (!form.education?.length) return;
                        children.push(sectionHeading('Education'));
                        form.education.forEach(e => {
                            children.push(new Paragraph({ children: [new TextRun({ text: `${e.degree || ''}${e.institution ? ' — ' + e.institution : ''}`, bold: true, size: 24 })], spacing: { before: 80 } }));
                            const eduMetaParts = [];
                            if (e.location) eduMetaParts.push(new TextRun({ text: e.location, italics: true, size: 20, color: '555555' }));
                            eduMetaParts.push(new TextRun({ text: `${e.location ? ' | ' : ''}${e.startDate || ''} - ${e.endDate || ''}`, italics: true, size: 20, color: '555555' }));
                            if (e.gpa) {
                                eduMetaParts.push(new TextRun({ text: ' | ', italics: true, size: 20, color: '555555' }));
                                eduMetaParts.push(new TextRun({ text: 'CGPA: ', bold: true, italics: true, size: 20, color: '555555' }));
                                eduMetaParts.push(new TextRun({ text: e.gpa, italics: true, size: 20, color: '555555' }));
                            }
                            children.push(new Paragraph({ children: eduMetaParts, spacing: { after: 80 } }));
                            if (e.coursework) children.push(new Paragraph({ children: [new TextRun({ text: 'Relevant Coursework: ', bold: true }), new TextRun({ text: e.coursework })], spacing: { after: 60 } }));
                        });
                    },
                    certifications: () => {
                        if (!form.certifications?.length) return;
                        children.push(sectionHeading('Certifications'));
                        form.certifications.forEach(c => {
                            children.push(new Paragraph({
                                children: [
                                    new TextRun({ text: `${c.name || ''}${c.issuer ? ' — ' + c.issuer : ''}`, bold: true }),
                                    new TextRun({ text: c.date ? `\t${c.date}` : '' })
                                ],
                                spacing: { after: 40 },
                                tabStops: [{ type: 'right', position: 9026 }]
                            }));
                            (c.bullets || []).forEach(b => { if (b.text) children.push(bulletLine(b.text)); });
                        });
                    }
                };

                sectionOrder.forEach(key => {
                    if (sectionVisibility[key] === false) return;
                    sectionBuilders[key]?.();
                });

                const doc = new Document({ sections: [{ children }] });
                const blob = await Packer.toBlob(doc);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `${p.fullName || 'Resume'}.docx`;
                document.body.appendChild(a); a.click(); a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 4000);
                toast('Downloaded as Word doc! 📝', 's');
            } catch (e) {
                console.error(e);
                toast('DOCX export failed', 'e');
            }
            btn.disabled = false; btn.innerHTML = original;
        }

        document.addEventListener('DOMContentLoaded', init);
        
    </script>
