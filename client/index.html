<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ATS Resume Creator</title>
    <meta name="description"
        content="Build an ATS-friendly, professional resume in minutes. Pick a field, fill in your details, and export a polished PDF with working links.">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236366f1'/%3E%3Ctext x='50' y='68' font-size='54' font-family='Arial' font-weight='900' fill='white' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-docx-js/dist/html-docx.js"></script>

    <style>
        :root {
            --bg: #06070e;
            --bg2: #0a0c18;
            --card: #0f1124;
            --card-hover: #131636;
            --border: #1a1d35;
            --border-light: #252845;
            --text: #e8eaf5;
            --text2: #c4c7d8;
            --muted: #717594;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-dark: #4f46e5;
            --accent2: #a855f7;
            --accent3: #06b6d4;
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.1);
            --yellow: #f59e0b;
            --yellow-bg: rgba(245, 158, 11, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
            --glass: rgba(15, 17, 36, 0.8);
            --glass-border: rgba(255, 255, 255, 0.06);
            --neu-dark: rgba(0, 0, 0, 0.55);
            --neu-light: rgba(255, 255, 255, 0.035);
            --neu-raised: 8px 8px 18px var(--neu-dark), -8px -8px 18px var(--neu-light);
            --neu-raised-sm: 4px 4px 10px var(--neu-dark), -4px -4px 10px var(--neu-light);
            --neu-raised-lg: 12px 12px 26px var(--neu-dark), -10px -10px 22px var(--neu-light);
            --neu-inset: inset 6px 6px 14px var(--neu-dark), inset -6px -6px 14px var(--neu-light);
            --neu-inset-sm: inset 3px 3px 7px var(--neu-dark), inset -3px -3px 7px var(--neu-light);
            --glass-field-bg: rgba(255, 255, 255, 0.045);
            --glass-field-border: rgba(255, 255, 255, 0.09);
            --glass-field-highlight: rgba(255, 255, 255, 0.06);
            /* User-adjustable resume typography (Section Order & Visibility panel) */
            --resume-heading-size: 11pt;
            --resume-text-size: 12pt;
            --resume-name-size: 27pt;
            --resume-title-size: 13pt;
        }

        [data-theme="light"] {
            --bg: #f1f3f9;
            --bg2: #f8f9fc;
            --card: #ffffff;
            --card-hover: #fafbff;
            --border: #e2e5f0;
            --border-light: #eef0f7;
            --text: #1a1c2e;
            --text2: #3d4058;
            --muted: #8b8fa8;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.08);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.08);
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.06);
            --neu-dark: rgba(163, 177, 198, 0.55);
            --neu-light: rgba(255, 255, 255, 0.9);
            --neu-raised: 8px 8px 18px var(--neu-dark), -8px -8px 18px var(--neu-light);
            --neu-raised-sm: 4px 4px 10px var(--neu-dark), -4px -4px 10px var(--neu-light);
            --neu-raised-lg: 12px 12px 26px var(--neu-dark), -10px -10px 22px var(--neu-light);
            --neu-inset: inset 6px 6px 14px var(--neu-dark), inset -6px -6px 14px var(--neu-light);
            --neu-inset-sm: inset 3px 3px 7px var(--neu-dark), inset -3px -3px 7px var(--neu-light);
            --glass-field-bg: rgba(255, 255, 255, 0.5);
            --glass-field-border: rgba(255, 255, 255, 0.85);
            --glass-field-highlight: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.03) 0%, transparent 50%);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.3s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }



        #app {
            min-height: 100vh;
        }

        #app.app-fullscreen {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #app.app-fullscreen .editor-layout {
            flex: 1;
            min-height: 0;
        }

        .boot-loader {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .boot-spinner {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: none;
            box-shadow: 0 6px 20px -6px var(--neu-dark), inset 0 -1px 0 var(--neu-light);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-light), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .logo-icon {
            font-size: 28px;
            -webkit-text-fill-color: initial;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Centered header variant: fixed-width side columns so the middle
       content (field badge + title) is perfectly centered in the bar. */
        .header-centered {
            display: grid;
            grid-template-columns: 40px 1fr 40px;
            align-items: center;
            gap: 12px;
        }

        .header-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 0;
        }

        .header-center-label {
            font-weight: 800;
            font-size: 16px;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 480px) {
            .header-centered {
                grid-template-columns: 36px 1fr 36px;
                gap: 8px;
            }

            .header-center-label {
                font-size: 14px;
            }
        }

        /* FAQ SECTION */
        .faq-section {
            max-width: 800px;
            margin: 60px auto 20px;
            padding: 0 20px;
        }

        .faq-section .faq-title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-light), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .faq-section .faq-subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 32px;
        }

        .faq-item {
            background: var(--card);
            border: none;
            border-radius: var(--radius);
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: var(--neu-raised-sm);
            transition: all 0.3s ease;
        }

        .faq-item:hover {
            box-shadow: var(--neu-raised);
        }

        .faq-question {
            width: 100%;
            padding: 16px 20px;
            background: transparent;
            border: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            gap: 16px;
        }

        .faq-question:hover {
            color: var(--accent-light);
        }

        .faq-question .faq-icon {
            flex-shrink: 0;
            font-size: 18px;
            transition: transform 0.3s ease;
            color: var(--accent-light);
            display: inline-block;
        }

        .faq-item.open .faq-question .faq-icon {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                padding 0.3s ease;
            padding: 0 20px;
        }

        .faq-item.open .faq-answer {
            max-height: 400px;
            padding: 0 20px 18px 20px;
        }

        .faq-answer p {
            color: var(--text2);
            font-size: 13.5px;
            line-height: 1.7;
            margin: 0;
        }

        .faq-answer a {
            color: var(--accent-light);
            text-decoration: none;
        }

        .faq-answer a:hover {
            text-decoration: underline;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            text-decoration: none;
            line-height: 1;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-p {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: var(--neu-raised-sm), 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-p:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--neu-raised-sm), 0 8px 25px rgba(99, 102, 241, 0.45);
        }

        .btn-p:active:not(:disabled) {
            box-shadow: var(--neu-inset-sm);
        }

        .btn-p::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-p:hover::after {
            left: 100%;
        }

        .btn-g {
            background: var(--card);
            border: none;
            color: var(--text2);
            box-shadow: var(--neu-raised-sm);
        }

        .btn-g:hover:not(:disabled) {
            color: var(--accent);
            background: var(--card-hover);
        }

        .btn-g:active:not(:disabled) {
            box-shadow: var(--neu-inset-sm);
        }

        .btn-s {
            padding: 7px 14px;
            font-size: 11px;
            border-radius: 6px;
        }

        .btn-lg {
            padding: 15px 32px;
            font-size: 16px;
            width: 100%;
            border-radius: var(--radius);
        }

        .btn-ic {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--card);
            color: var(--muted);
            cursor: pointer;
            font-size: 17px;
            transition: all 0.25s;
            box-shadow: var(--neu-raised-sm);
        }

        .btn-ic:hover {
            color: var(--accent);
            background: var(--card-hover);
            transform: rotate(5deg);
        }

        .btn-ic:active {
            box-shadow: var(--neu-inset-sm);
            transform: rotate(0deg) scale(0.96);
        }

        .btn-ic.active {
            color: var(--accent);
            background: var(--card-hover);
            box-shadow: var(--neu-inset-sm);
        }

        .btn-ic:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: var(--neu-raised-sm);
        }

        .btn-ic:disabled:hover {
            color: var(--muted);
            background: var(--card);
            transform: none;
        }

        .btn-ic svg {
            width: 17px;
            height: 17px;
            display: block;
            flex-shrink: 0;
        }

        .btn-ic:hover {
            transform: none;
        }

        /* ============================================================
       MODERN TOOLBAR — icon buttons grouped into segmented pills,
       mirroring the theme-toggle pattern (see .theme-toggle below)
       ============================================================ */
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--card);
            border-radius: 14px;
            padding: 4px;
            box-shadow: var(--neu-raised-sm);
        }

        .toolbar-group .btn-ic {
            width: 34px;
            height: 34px;
            box-shadow: none;
            background: transparent;
            border-radius: 10px;
            color: var(--muted);
        }

        .toolbar-group .btn-ic:hover:not(:disabled) {
            background: var(--card-hover);
            color: var(--text);
        }

        .toolbar-group .btn-ic:active:not(:disabled) {
            box-shadow: var(--neu-inset-sm);
            transform: scale(0.94);
        }

        .toolbar-group .btn-ic.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.4);
        }

        .toolbar-group .btn-ic:disabled {
            opacity: 0.3;
        }

        .toolbar-group .btn-ic:disabled:hover {
            background: transparent;
            color: var(--muted);
        }

        .toolbar-group .tg-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
            flex-shrink: 0;
        }

        /* ============================================================
       THEME TOGGLE — 3-way segmented pill (Light / System / Dark)
       ============================================================ */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--bg2);
            border-radius: 20px;
            padding: 3px;
            box-shadow: var(--neu-inset-sm);
        }

        .theme-toggle button {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-toggle button svg {
            width: 15px;
            height: 15px;
            display: block;
        }

        .theme-toggle button:hover:not(.active) {
            color: var(--text2);
        }

        .theme-toggle button.active {
            background: var(--card);
            color: var(--accent-light);
            box-shadow: var(--neu-raised-sm);
        }


        /* CARDS */
        .card {
            background: var(--card);
            border: none;
            border-radius: var(--radius-lg);
            padding: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: var(--neu-raised);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--neu-raised-lg);
            background: var(--card-hover);
        }

        /* FIELD CARDS */
        .field-card {
            background: var(--card);
            border: none;
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: var(--neu-raised);
        }

        .field-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            opacity: 0;
            transition: all 0.35s;
            border-radius: 0 0 4px 4px;
        }

        .field-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(99, 102, 241, 0.08) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .field-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--neu-raised-lg), var(--shadow-glow);
        }

        .field-card:hover::before {
            opacity: 1;
        }

        .field-card:hover::after {
            opacity: 1;
        }

        .field-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 10px;
        }

        .field-card-icon {
            font-size: 34px;
            line-height: 1;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.1));
            border-radius: 14px;
            border: none;
            box-shadow: var(--neu-raised-sm);
            transition: all 0.3s;
        }

        .field-card:hover .field-card-icon {
            transform: scale(1.1) rotate(-5deg);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.25), rgba(168, 85, 247, 0.2));
        }

        .field-card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            letter-spacing: -0.3px;
        }

        .field-card-desc {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 14px;
        }

        .field-card-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .field-card-keyword {
            padding: 5px 12px;
            background: var(--glass-field-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-field-border);
            border-radius: 20px;
            font-size: 11px;
            color: var(--accent-light);
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .field-card:hover .field-card-keyword {
            background: rgba(99, 102, 241, 0.12);
            border-color: rgba(99, 102, 241, 0.35);
        }

        /* ============================================================
       ANIMATED CARD STACK (landing screen field picker)
       ============================================================ */
        .stack-outer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 44px;
        }

        .stack-viewport {
            position: relative;
            width: 100%;
            max-width: 540px;
            height: 360px;
            margin: 0 auto 20px;
        }

        .stack-card {
            position: absolute;
            left: 50%;
            bottom: 0;
            width: min(90vw, 480px);
            min-height: 270px;
            background: var(--card);
            border: none;
            border-radius: 20px 20px 4px 4px;
            box-shadow: var(--neu-raised-lg);
            padding: 26px 24px;
            transition: transform 0.62s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.45s ease, box-shadow 0.3s ease;
            will-change: transform, opacity;
        }

        .stack-card[data-pos="0"]:hover {
            box-shadow: var(--neu-raised-lg), var(--shadow-glow);
        }

        .stack-card-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
        }

        .stack-card-select {
            margin-top: 8px;
        }

        .stack-controls {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .stack-dots {
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 0.5px;
            min-width: 44px;
            text-align: center;
        }

        .monogram {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            color: #fff;
            font-weight: 800;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stack-card:hover .monogram {
            transform: scale(1.06) rotate(-3deg);
        }

        /* INPUTS */
        .input {
            width: 100%;
            padding: 11px 16px;
            background: var(--glass-field-bg);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
            backdrop-filter: blur(14px) saturate(160%);
            border: 1px solid var(--glass-field-border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: all 0.25s;
            box-shadow: inset 0 1px 0 var(--glass-field-highlight), var(--neu-inset-sm);
        }

        .input:hover {
            border-color: var(--accent-light);
        }

        .input:focus {
            border-color: var(--accent);
            box-shadow: inset 0 1px 0 var(--glass-field-highlight), var(--neu-inset-sm), 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        .input::placeholder {
            color: var(--muted);
        }

        textarea.input {
            resize: vertical;
            min-height: 90px;
            line-height: 1.6;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        /* GRID */
        .grid {
            display: grid;
            gap: 18px;
        }

        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .grid-auto {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .span-2 {
            grid-column: 1 / -1;
        }



        /* HERO */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero h1 {
            font-size: clamp(32px, 6vw, 52px);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent2) 50%, var(--accent3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            line-height: 1.2;
            letter-spacing: -1px;
            position: relative;
        }

        .hero p {
            color: var(--muted);
            font-size: 17px;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 12px;
            color: var(--accent-light);
            font-weight: 600;
            margin-bottom: 24px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .container-sm {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* LOADING */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-content {
            text-align: center;
        }

        .loading-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .loading-pulse {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .loading-progress {
            width: 300px;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px auto 0;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            background-size: 200% 100%;
            border-radius: 4px;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* EDITOR */
        .editor-layout {
            display: flex;
            height: calc(100vh - 62px);
            overflow: hidden;
        }

        .edit-panel {
            width: 430px;
            flex-shrink: 0;
            overflow-y: auto;
            padding: 24px 20px;
            background: var(--bg2);
            border-right: none;
            box-shadow: inset -10px 0 20px -14px var(--neu-dark);
        }

        .preview-panel {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg);
        }

        /* ACCORDION SECTIONS */
        .acc-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            margin-bottom: 10px;
        }

        .acc-header h3 {
            font-size: 14px;
        }

        .acc-chevron {
            display: inline-flex;
            color: var(--muted);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .acc-body {
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            max-height: 3000px;
            opacity: 1;
        }

        .acc-body.collapsed {
            max-height: 0;
            opacity: 0;
        }

        .item-block {
            background: var(--bg2);
            border: none;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.25s;
            animation: fadeInUp 0.3s ease;
            box-shadow: var(--neu-inset-sm);
        }

        .item-block:hover {
            box-shadow: var(--neu-inset);
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 6px 5px 12px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-light);
            font-weight: 600;
            animation: fadeInUp 0.25s ease;
        }

        .tag-chip button {
            background: none;
            border: none;
            color: var(--accent-light);
            cursor: pointer;
            font-size: 13px;
            line-height: 1;
            padding: 2px 4px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .tag-chip button:hover {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red);
            transform: scale(1.15);
        }

        .add-row {
            display: flex;
            gap: 6px;
        }

        .add-row .input {
            flex: 1;
        }

        /* ATS RING */
        .ats-score {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--card);
            border: none;
            border-radius: var(--radius);
            box-shadow: var(--neu-raised-sm);
        }

        .ats-ring {
            width: 48px;
            height: 48px;
            position: relative;
            cursor: pointer;
        }

        .ats-ring svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 6px currentColor);
        }

        .ats-ring circle {
            fill: none;
            stroke-width: 3.5;
        }

        .ats-ring .bg {
            stroke: var(--border);
        }

        .ats-ring .fill {
            stroke-linecap: round;
            transition: stroke-dasharray 1s ease, stroke 0.5s;
        }

        .ats-ring .score {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            font-weight: 800;
        }

        .ats-detail-panel {
            animation: fadeInUp 0.25s ease;
            border-bottom: none;
            box-shadow: var(--neu-inset-sm);
            background: var(--bg2);
            padding: 16px 20px;
            flex-shrink: 0;
        }

        .ats-detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .ats-check-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12.5px;
            margin-bottom: 6px;
            color: var(--text2);
        }

        .ats-check-row .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
        }

        .ats-check-row.pass .dot {
            background: var(--green-bg);
            color: var(--green);
        }

        .ats-check-row.fail .dot {
            background: var(--red-bg);
            color: var(--red);
        }

        .ats-detail-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .kw-pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .kw-pill {
            font-size: 10.5px;
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 600;
        }

        .kw-pill.hit {
            background: var(--green-bg);
            color: var(--green);
        }

        .kw-pill.miss {
            background: var(--red-bg);
            color: var(--red);
            cursor: pointer;
        }

        /* TEMPLATE PICKER PILLS */
        .tpl-picker {
            display: flex;
            gap: 4px;
            background: var(--bg2);
            border-radius: 8px;
            padding: 3px;
            max-width: 100%;
            overflow-x: auto;
            scrollbar-width: none;
            box-shadow: var(--neu-inset-sm);
        }

        .tpl-picker::-webkit-scrollbar {
            display: none;
        }

        .tpl-pill {
            padding: 7px 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: var(--muted);
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tpl-pill.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: var(--neu-raised-sm);
        }

        .tpl-pill:hover:not(.active) {
            color: var(--text);
        }

        .ats-label-text {
            white-space: nowrap;
        }

        /* ============================================================
       QUICK-INFO WIZARD (multi-step form)
       ============================================================ */
        .wizard-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .wizard-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .wizard-dot.active {
            width: 26px;
            border-radius: 5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
        }

        .wizard-dot.done {
            background: var(--accent-light);
        }

        .wizard-fields {
            animation: fadeInUp 0.35s ease;
            min-height: 140px;
        }

        .wizard-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 28px;
        }

        .wizard-step-count {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .entry-type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 18px;
        }

        .entry-type-card {
            border: none;
            border-radius: var(--radius);
            padding: 22px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--card);
            position: relative;
            box-shadow: var(--neu-raised-sm);
        }

        .entry-type-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--neu-raised);
        }

        .entry-type-card.selected {
            background: rgba(99, 102, 241, 0.08);
            box-shadow: var(--neu-inset-sm), 0 0 0 2px rgba(99, 102, 241, 0.35);
        }

        .entry-type-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .entry-type-card .et-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .entry-type-card .et-desc {
            font-size: 11.5px;
            color: var(--muted);
            line-height: 1.4;
        }

        .entry-type-card .et-check {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: var(--bg2);
            box-shadow: var(--neu-inset-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: transparent;
            transition: all 0.2s;
        }

        .entry-type-card.selected .et-check {
            background: var(--accent);
            box-shadow: none;
            color: #fff;
        }

        .entry-type-hint {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .conditional-block {
            animation: fadeInUp 0.35s ease;
            margin-bottom: 16px;
            margin-top: 6px;
            padding: 16px 16px 4px;
            border: none;
            border-radius: var(--radius);
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.04), transparent 40%);
            box-shadow: var(--neu-inset-sm);
        }

        .conditional-block .cb-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--accent-light);
            margin-bottom: 14px;
        }

        .conditional-block .cb-label .cb-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 7px;
            background: rgba(99, 102, 241, 0.15);
            font-size: 12px;
        }

        /* Native selects styled to match .input, with a custom chevron */
        .select-wrap {
            position: relative;
        }

        .select-wrap select.input {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            padding-right: 34px;
            cursor: pointer;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--muted);
            font-size: 11px;
        }

        .select-wrap select.input option {
            background: var(--card);
            color: var(--text);
        }

        /* Toggle-style checkbox row, e.g. "I currently work here" */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            background: var(--bg2);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            box-shadow: var(--neu-inset-sm);
        }

        .checkbox-row:hover {
            box-shadow: var(--neu-inset);
        }

        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-row span {
            font-size: 12.5px;
            color: var(--text2);
            font-weight: 600;
        }

        .field-hint {
            font-size: 10.5px;
            color: var(--muted);
            margin-top: 5px;
            display: block;
        }

        /* ============================================================
       SECTION ORDER & VISIBILITY + FONT SIZE CONTROLS
       ============================================================ */
        .section-order-panel {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--neu-raised);
        }

        .section-order-panel .section-order-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text2);
            margin-bottom: 12px;
        }

        .section-order-panel .section-order-title svg {
            width: 15px;
            height: 15px;
            color: var(--accent-light);
            flex-shrink: 0;
        }

        .section-order-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg2);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            cursor: grab;
            transition: all 0.2s ease;
            box-shadow: var(--neu-inset-sm);
        }

        .section-order-item:active {
            cursor: grabbing;
        }

        .section-order-item.dragging {
            opacity: 0.4;
        }

        .section-order-item:hover {
            box-shadow: var(--neu-inset);
            background: var(--card-hover);
        }

        .section-order-item .drag-handle {
            color: var(--muted);
            cursor: grab;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .section-order-item .drag-handle svg {
            width: 14px;
            height: 14px;
        }

        .section-order-item .section-label {
            font-size: 12.5px;
            font-weight: 700;
            color: var(--text2);
        }

        .section-order-item .section-badge {
            font-size: 9px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 10px;
            background: var(--border);
            color: var(--muted);
        }

        .section-order-item .section-toggle {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .section-order-item .section-toggle input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .section-order-item .section-toggle .btn-ic {
            width: 26px;
            height: 26px;
            box-shadow: none;
            background: var(--card);
        }

        .section-order-item .section-toggle .btn-ic svg {
            width: 13px;
            height: 13px;
        }

        .section-order-hint {
            font-size: 10.5px;
            color: var(--muted);
            margin-top: 8px;
            text-align: center;
        }

        .font-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 18px;
            padding: 14px 16px;
            background: var(--bg2);
            border-radius: var(--radius-sm);
            margin-top: 14px;
            box-shadow: var(--neu-inset-sm);
        }

        .font-controls .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 130px;
        }

        .font-controls .control-group label {
            font-size: 9.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            margin: 0;
            white-space: nowrap;
        }

        .font-controls .control-group input[type="range"] {
            flex: 1;
            min-width: 50px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .font-controls .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.5);
        }

        .font-controls .control-group input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border: none;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .font-controls .control-group .size-value {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent-light);
            min-width: 30px;
            text-align: right;
        }

        @media (max-width: 480px) {
            .section-order-item { flex-wrap: wrap; }
            .font-controls { flex-direction: column; gap: 10px; }
            .font-controls .control-group { min-width: 100%; }
        }

        /* ============================================================
       RESUME PREVIEW - PAPER LOOK
       ============================================================ */
        .resume {
            background: #ffffff;
            color: #1a1a1a;
            width: 8.5in;
            min-height: 11in;
            padding: 0.75in;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(0, 0, 0, 0.05);
            font-size: var(--resume-text-size);
            line-height: 1.55;
            flex-shrink: 0;
            border-radius: 2px;
            position: relative;
        }

        .resume.classic {

            if (!redoStack.length) { toast('Nothing to redo', 'e'); return; }

            render(); toast('Redid change', 's');

        function handleGlobalKeydown(e) {
            if (state.screen !== 'editor') return;
            const mod = e.ctrlKey || e.metaKey;
            if (!mod) return;
            if (e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
            else if ((e.key.toLowerCase() === 'z' && e.shiftKey) || e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
        }
        document.addEventListener('keydown', handleGlobalKeydown);

            document.querySelectorAll('.theme-toggle button').forEach(b =>

            const mode = localStorage.getItem('themeMode') || 'dark';

        function init() {
            const mode = localStorage.getItem('themeMode') || 'dark';
            applyTheme(mode);
            applyFontSizes();
            checkPdfLibs();

        
            const activeScreen = localStorage.getItem(ACTIVE_SCREEN_KEY);
            const autosave = loadAutosave();
            if (activeScreen === 'editor' && autosave && autosave.form) {
                restoreSession(autosave);
                toast('Welcome back — restored your resume', 's');
                return;
            }

            render();
        }

        function checkPdfLibs() {
            const i = setInterval(() => {
                if (window.jspdf && window.html2canvas) { state.isPdfReady = true; clearInterval(i) }
            }, 500);
            const j = setInterval(() => {
                if (window.docx) { state.isDocxReady = true; clearInterval(j) }
            }, 500);
        }

        // Render
        function render() {
            const app = document.getElementById('app');
            switch (state.screen) {
                case 'intro': app.innerHTML = renderIntro(); initIntro(); break;
                case 'select': app.innerHTML = renderSelect(); initStack(); break;
                case 'quick': app.innerHTML = renderQuick(); break;
                case 'loading': app.innerHTML = renderLoading(); startGeneration(); break;
                case 'editor': app.innerHTML = renderEditor(); break;
            }
            app.classList.toggle('app-fullscreen', state.screen === 'editor');
            app.classList.remove('animate-in');
            void app.offsetWidth; // restart animation
            app.classList.add('animate-in');
        }

        function scrollToStack() {
            state.screen = 'select'; render();
            requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }

        function renderFooter() {
            const year = new Date().getFullYear();
            return `
                <footer class="site-footer">
                    <div class="container footer-inner">
                        <div class="footer-brand">
                            <div class="footer-logo">📄 ATS Resume</div>
                            <p>Build an ATS-friendly, professional resume in minutes pick a field, fill in your details, export a polished PDF with real, clickable links. No sign-up required.</p>
                        </div>
                        <div class="footer-links">
                            <div class="footer-col">
                                <h4>Product</h4>
                                <a onclick="scrollToStack()">Browse Fields</a>
                            </div>
                            <div class="footer-col">
                                <h4>Your Privacy</h4>
                                <p class="footer-note">Your data is securely stored to support your account and application features. We prioritize your privacy and only collect the information necessary for the app to function.</p>
                            </div>
                        </div>
                    </div>
                    <div class="container footer-bottom">
                        <span>© ${year} ATS Resume. All rights reserved.</span>
                        <span class="job">Built for job seekers , not recruiter bots.</span>
                    </div>
                </footer>
            `;
        }


        const VIDEO_SRC = './AI_Resume.mp4';


        function renderIntro() {
            return `
                <div class="intro-screen" id="introScreen">
                    <div class="intro-particles">${Array.from({ length: 18 }).map((_, i) => `<span class="intro-particle" style="--i:${i}"></span>`).join('')}</div>
                    <video class="intro-video" id="introVideo" src="${VIDEO_SRC}" autoplay muted playsinline></video>
                    <div class="intro-overlay" id="introOverlay">
                        <div class="intro-title">Build ATS-Optimized Resumes with AI</div>
                        <div class="intro-subtitle">Fast &nbsp;•&nbsp; Professional &nbsp;•&nbsp; Job-Ready</div>
                    </div>
                    <button class="intro-skip" onclick="enterApp()">Skip Intro →</button>
                </div>
            `;
        }

        function initIntro() {
            const video = document.getElementById('introVideo');
            if (!video) return;
            video.addEventListener('ended', enterApp);
        
            video.addEventListener('error', enterApp);
            // Reveal the headline text just before the clip ends.
            video.addEventListener('timeupdate', () => {
                if (video.duration && video.currentTime >= video.duration - 2.5) {
                    document.getElementById('introOverlay')?.classList.add('show');
                }
            });
        }

        function enterApp() {
            const screen = document.getElementById('introScreen');
            if (!screen || screen.dataset.leaving) { state.screen = 'select'; render(); return; }
            screen.dataset.leaving = '1';
            screen.classList.add('intro-leaving');
            setTimeout(() => { state.screen = 'select'; render(); }, 700);
        }

        function renderSelect() {
            const autosave = loadAutosave();
            const savedCount = getSavedResumes().length;
            return `
        <div class="header">
            <div class="logo" onclick="state.screen='select';render()">📄 ATS Resume</div>
            <div class="header-actions">
                <div class="toolbar-group">
                    <button class="btn-ic" onclick="openSavedResumesModal()" aria-label="My Resumes" title="My Resumes${savedCount ? ` (${savedCount})` : ''}">${ICONS.save}</button>
                </div>
                ${renderThemeToggle()}
            </div>
        </div>
        <div class="hero">
            <h1>Create Your ATS Resume</h1>
            <p>Flip through fields and pick the one that fits AI crafts a professional resume in seconds</p>
        </div>
        <div class="container">
            ${autosave ? `
            <div class="restore-banner">
                <div class="restore-banner-text">You have an <strong>unsaved resume</strong> in progress (${esc((FIELDS.find(f => f.key === autosave.fieldKey) || {}).label || autosave.fieldKey)}, saved ${new Date(autosave.savedAt).toLocaleString()}). Your data stays on this device only.</div>
                <div class="restore-banner-actions">
                    <button class="btn btn-g btn-s" onclick="clearAutosave();clearActiveScreen();render()">Discard</button>

            <div class="stack-outer">

                <div class="stack-controls">

            <!-- ✅ FAQ SECTION - Place it RIGHT HERE, inside the container, before footer -->
            <div class="faq-section">
                <h2 class="faq-title">Frequently Asked Questions</h2>

                        <p>ATS (Applicant Tracking System) is software used by 98% of Fortune 500 companies to filter job applications. It scans your resume for keywords and formatting compatibility before a human ever sees it. Our tool helps you create a resume that passes ATS filters while still looking professional.</p>

                </div>

                <div class="faq-item">
                    <button class="faq-question" onclick="toggleFaq(this)">
                        <span>Is my data stored anywhere?</span>

                <div class="faq-item">
                    <button class="faq-question" onclick="toggleFaq(this)">
